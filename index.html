<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Developer Tools</title>
  <meta name="description" content="A local-first suite of developer utilities that runs entirely in the browser." />
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="navToggle" class="icon-button" type="button" aria-label="Open tool menu" aria-controls="toolSidebar" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <div>
        <p class="app-kicker">Local suite</p>
        <strong><a class="brand-home-link" href="./">Developer Tools</a></strong>
      </div>
    </header>

    <aside id="toolSidebar" class="sidebar" aria-label="Tool menu">
      <div class="sidebar-top">
        <div class="brand">
          <p class="app-kicker">Local suite</p>
          <h1><a class="brand-home-link" href="./">Developer Tools</a></h1>
          <p>Fast utilities for technical work, running entirely in your browser.</p>
        </div>

        <div class="sidebar-controls" aria-label="Display options">
          <button id="themeToggle" class="sidebar-action" type="button" aria-label="Use dark theme">
            <span class="sidebar-action-icon" aria-hidden="true">T</span>
            <span class="sidebar-action-text">Dark theme</span>
          </button>
          <button id="sidebarCollapse" class="sidebar-action sidebar-collapse-button" type="button" aria-label="Collapse tool menu" aria-pressed="false">
            <span class="sidebar-action-icon" aria-hidden="true">C</span>
            <span class="sidebar-action-text">Collapse</span>
          </button>
        </div>
      </div>

      <div class="search-field">
        <label for="toolSearch">Search tools</label>
        <input id="toolSearch" type="search" autocomplete="off" placeholder="Search by name or category" />
      </div>

      <nav id="toolNav" class="tool-nav" aria-label="Available and planned tools"></nav>
    </aside>

    <button id="navBackdrop" class="nav-backdrop" type="button" aria-label="Dismiss menu overlay"></button>

    <main class="workspace">
      <section class="workspace-header" aria-labelledby="activeToolTitle">
        <div class="workspace-meta">
          <p id="activeToolCategory" class="eyebrow">Overview</p>
          <span id="activeToolStatus" class="status-pill">Local first</span>
        </div>
        <h2 id="activeToolTitle">Developer Tools</h2>
        <p id="activeToolSummary">Choose a browser-only utility or scan the catalogue by category.</p>
      </section>

      <section id="toolMount" class="tool-mount" aria-live="polite"></section>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
